<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oddsklub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Oddsklub</h1>
      <p>Upload kampbillede og gem data i Google Sheet</p>
    </header>

    <form id="betForm" class="card">
      <label>
        Medlem
        <select id="member" required>
          <option value="">Vælg medlem</option>
          <option>Medlem 1</option>
          <option>Medlem 2</option>
          <option>Medlem 3</option>
          <option>Medlem 4</option>
          <option>Medlem 5</option>
        </select>
      </label>

      <label>
        Dato
        <input type="date" id="matchDate" required />
      </label>

      <label>
        Kamp
        <input type="text" id="matchName" placeholder="Fx Liverpool - Arsenal" required />
      </label>

      <label>
        Odds
        <input type="number" step="0.01" id="odds" placeholder="Fx 2.35" required />
      </label>

      <label>
        Indsats
        <input type="number" step="0.01" id="stake" placeholder="Fx 100" required />
      </label>

      <label>
        Note
        <textarea id="note" rows="3" placeholder="Valgfri note"></textarea>
      </label>

      <label>
        Billede af spil
        <input type="file" id="photo" accept="image/*" capture="environment" required />
      </label>

      <img id="preview" class="preview hidden" alt="Forhåndsvisning" />

      <button type="submit" id="submitBtn">Send til Google Sheet</button>
      <p id="status" class="status"></p>
    </form>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
